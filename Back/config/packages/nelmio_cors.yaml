nelmio_cors:
    defaults:
        origin_regex: false
        # Restrict to known dev origins. Update this list in production to your frontend domains.
        allow_origin: ['http://localhost:3000', 'http://127.0.0.1:3000', 'http://localhost:5173']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization', 'X-Requested-With']
        expose_headers: ['Link']
        max_age: 3600
    paths:
        # Limit CORS to API endpoints only.
        '^/api': null
